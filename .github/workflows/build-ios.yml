name: Build iOS (Simulator)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'ios/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'index.html'
      - '.github/workflows/build-ios.yml'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npx cap sync ios

      # Simulator build only — no signing certs/provisioning profile available here.
      # A real device / App Store build needs an Apple Developer account and must
      # be signed either locally in Xcode or via secrets added to this workflow.
      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -workspace ios/App/App.xcodeproj/project.xcworkspace \
            -scheme App \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - uses: actions/upload-artifact@v4
        with:
          name: trendfit-ios-simulator-build
          path: build/Build/Products/Debug-iphonesimulator/App.app
          retention-days: 30
